worker_processes 1;
pid /tmp/opcache_user_cache_benchmark.nginx.pid;
error_log /tmp/opcache_user_cache_benchmark.nginx.log notice;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    keepalive_timeout 30;
    client_body_temp_path /tmp/opcache_user_cache_benchmark.nginx-client 1 2;
    fastcgi_temp_path /tmp/opcache_user_cache_benchmark.nginx-fastcgi 1 2;
    proxy_temp_path /tmp/opcache_user_cache_benchmark.nginx-proxy 1 2;
    uwsgi_temp_path /tmp/opcache_user_cache_benchmark.nginx-uwsgi 1 2;
    scgi_temp_path /tmp/opcache_user_cache_benchmark.nginx-scgi 1 2;

    server {
        listen 127.0.0.1:8080;
        server_name _;
        root public;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_index index.php;
            fastcgi_pass 127.0.0.1:9000;
        }
    }
}
